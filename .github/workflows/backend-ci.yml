name: Backend CI

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-mock pytest-env

      - name: Run tests
        env:
          DATABASE_URL: postgresql+**asyncpg**://postgres:postgres@localhost:5432/gutiq  # ← ADD +asyncpg
          JWT_SECRET: testsecret123
        run: pytest tests/ -v

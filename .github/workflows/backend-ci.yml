name: Backend CI
on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    
    # ← ADD THIS: Postgres service container
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: gutiq
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    
    defaults:
      run:
        working-directory: backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-mock pytest-env asyncpg
      
      # ← ADD THIS: Wait for Postgres
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "✅ Postgres ready!"
              break
            fi
            echo "⏳ Waiting for Postgres... ($i/30)"
            sleep 2
          done
        
        - name: Setup test database
        env:
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/gutiq
        run: |
          python -c "
          import sqlalchemy
          from sqlalchemy import create_engine
          from app.db.models import Base
          engine = create_engine('$DATABASE_URL_SYNC')
          Base.metadata.create_all(bind=engine)
          print('✅ Database tables created!')
          "
      
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/gutiq
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/gutiq
          JWT_SECRET: testsecret123
        run: pytest tests/ -v

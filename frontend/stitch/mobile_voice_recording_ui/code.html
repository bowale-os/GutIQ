<div class="size-10"></div> <!-- Placeholder for symmetry -->
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-8 text-center gap-12">
<!-- Title & Status -->
<div class="space-y-3">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Listening...</h1>
<p class="text-slate-500 dark:text-slate-400 font-medium">Describe your symptoms in detail</p>
</div>
<!-- Central Mic Pulse Animation Visualizer -->
<div class="relative flex items-center justify-center">
<!-- Animated Rings (Static Representation) -->
<div class="absolute size-48 rounded-full bg-primary/10 animate-ping"></div>
<div class="absolute size-64 rounded-full bg-primary/5 animate-pulse"></div>
<!-- Primary Mic Button -->
<button class="relative size-32 rounded-full bg-primary flex items-center justify-center shadow-[0_0_50px_rgba(43,140,238,0.4)] hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-5xl text-white">mic</span>
</button>
</div>
<!-- Live Transcript Card -->
<div class="w-full bg-slate-100/50 dark:bg-slate-800/40 rounded-2xl p-6 border border-slate-200/50 dark:border-slate-700/30">
<div class="flex items-center justify-center gap-2 mb-4">
<span class="size-2 rounded-full bg-red-500 animate-pulse"></span>
<span class="text-[10px] font-bold tracking-[0.1em] text-slate-400 dark:text-slate-500 uppercase">Live Transcript</span>
</div>
<p class="text-lg leading-relaxed text-slate-700 dark:text-slate-200 min-h-[100px]">
            "I'm feeling some sharp pain in my upper abdomen after eating lunch. It started about 20 minutes ago and feels like a burning sensation..."
          </p>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="p-8 pb-12 flex flex-col items-center gap-4">
<div class="flex gap-4 w-full">
<button class="flex-1 h-14 bg-red-500/10 hover:bg-red-500/20 text-red-500 rounded-2xl font-bold flex items-center justify-center gap-2 transition-colors">
<span class="material-symbols-outlined">stop_circle</span>
            Stop
          </button>
<button class="flex-1 h-14 bg-primary text-white rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all">
<span class="material-symbols-outlined">check_circle</span>
            Analyze
          </button>
</div>

<div class="flex items-end justify-center gap-1 h-8 w-full opacity-40">

<div class="w-1 bg-primary rounded-full h-4"></div>
<div class="w-1 bg-primary rounded-full h-6"></div>
<div class="w-1 bg-primary rounded-full h-3"></div>
</div>
</footer>

</div>
